apiVersion: apps/v1
kind: Deployment
metadata:
  name: chat-redis-depl
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chat-redis
  template:
    metadata:
      labels:
        app: chat-redis
    spec:
      containers:
        - name: chat-redis
          image: redis:latest
          ports:
            - containerPort: 27017

---

apiVersion: v1
kind: Service
metadata:
  name: chat-redis-svc
spec:
  selector:
    app: chat-redis
  ports:
    - name: chat-redis
      protocol: TCP
      port: 27017
      targetPort: 27017