apiVersion : apps/v1
kind : Deployment
metadata :
  name : chat-mongo-depl
spec :
  replicas : 1
  selector :
    matchLabels :
      app : chat-mongo
  template :
    metadata :
      labels :
        app : chat-mongo
    spec :
      containers:
        - name: chat-mongo
          image: mongo
          ports :
            - containerPort : 27017

---

apiVersion : v1
kind : Service
metadata :
  name : chat-mongo-srv
spec :
  selector :  #find the pod with label app=chat-mongo
    app : chat-mongo
  ports :
    - name : chat-mongo-db
      protocol : TCP
      port : 27017
      targetPort : 27017